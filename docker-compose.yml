services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rpg_xp_voting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rpg_xp_voting"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/rpg_xp_voting
      JWT_SECRET: replace-with-a-long-random-secret
      CORS_ORIGINS: http://localhost:5173
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin12345
      ADMIN_DISPLAY_NAME: Game Master
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
